# =============================================================================
# FoveaMIL conda 環境 — CUDA 11.8
#   対象GPU: Pascal (GTX 1080Ti, sm_61) / Ampere (RTX A6000, sm_86) ほか sm_50–90
#   非対応 : Blackwell (RTX 50系, sm_120) → environment-cu128.yml を使う
#   作成   : conda env create -f environments/environment-cu118.yml
#   開発   : 作成後に  pip install -e .   （foveamil を editable 導入）
#   バージョンは検証済み環境の実値に固定する
# =============================================================================
name: foveamil-cu118
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.8

  # --- PyTorch GPU 版（CUDA 11.8 arch に sm_61 / sm_86 を含む）---
  - pytorch=2.4.1
  - torchvision=0.20.0
  - pytorch-cuda=11.8

  # --- コア依存 ---
  - numpy=1.24.4
  - scipy=1.10.1
  - pandas=2.0.3
  - scikit-learn=1.3.2
  - matplotlib=3.7.3
  - h5py=3.11.0
  - pyyaml=6.0.2
  - tensorboard=2.17.1
  - psutil=6.0.0
  - openslide=4.0.0

  - pip
  - pip:
    - opencv-python==4.12.0.88
    - openslide-python==1.4.1
    - timm==1.0.19
    - huggingface_hub==0.34.4
    - pytest==8.3.5
