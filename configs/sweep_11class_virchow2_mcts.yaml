# 11 クラス本番 sweep ― C（MCTS 探索駆動）単独
# foveamil-sweep --config configs/sweep_11class_virchow2_mcts.yaml \
#   --out experiments/11class_virchow2/mcts \
#   --weights-out /path/to/weights/11class_virchow2/mcts \
#   --gpu-ids 0,1,2 --mem-per-job-mb 4000
#
# C は探索駆動（policy/value + MCTS）で A/B/D とは別パラダイムのため単独評価する
#   多倍率 [10,20,40] と [1.25..40] × k_sample(3) = 6 combo × 10 fold = 60 job
# MCTS は 1 bag ごとに探索するため VRAM が読めない 1 ジョブ smoke で実測してから
# --mem-per-job-mb を設定し，メモリ動的スケジューラに安全に詰めさせる

resolve:
  n_cls: 11
  folds: 10
  feature_root: ${FEATURE_ROOT}
  cohort_root: cohort

sweep:
  encoder: [Virchow2]
  feature_type: [cls]
  magnifications:
    - [10.0, 20.0, 40.0]
    - [1.25, 2.5, 5.0, 10.0, 20.0, 40.0]
  k_sample: [1, 4, 8]             # 探索駆動の選定の広さ

fixed:
  zoom_driver: mcts               # C: 探索駆動
  mcts_planner: gumbel            # Gumbel-AlphaZero 流
  mcts_simulations: 16
  mcts_max_considered: 8
  policy_loss_weight: 1.0
  value_loss_weight: 1.0
  topk_method: perturbed
  k_sigma: 0.002
  lr: 1.0e-4
  drop_out: 0.5
  fusion: sum
  seed: 42
  max_epochs: 50
  scheduler_patience: 10
  scheduler_decay_rate: 0.8
  reg: 1.0e-4
  save_metric: f1
  is_weighted_sampler: true
  num_workers: 1

parallel:
  gpu_ids: [0, 1, 2]
  mem_per_job_mb: 4000            # smoke 実測後に調整する
