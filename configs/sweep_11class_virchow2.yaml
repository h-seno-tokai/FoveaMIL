# 11 クラス（FL グレード分割を主眼）本番 sweep ― ベースライン ＋ A/B/D アブレーション
# foveamil-sweep --config configs/sweep_11class_virchow2.yaml \
#   --out experiments/11class_virchow2/abd \
#   --weights-out /path/to/weights/11class_virchow2/abd \
#   --gpu-ids 0,1,2 --jobs-per-gpu 12
#
# 内訳（sweep 健全化の自動畳み込みで 1 config に集約）:
#   単一倍率 [40]/[20]/[10] × instance_loss{false,true}
#       = ABMIL(false) / CLAM(true) のベースライン 各 3 倍率 = 6 combo
#       （多倍率専用の A/B/D 軸は単一倍率では畳まれる）
#   多倍率 [10,20,40] と [1.25..40] × A(脱相関) × B(スパース) × D(DPP) の on/off
#       = 2 倍率セット × 2^3 = 16 combo（instance_loss は多倍率では畳まれる）
#   合計 22 combo × 10 fold = 220 job
# C（MCTS 探索駆動）は別パラダイムのため単独で configs/sweep_11class_virchow2_mcts.yaml

resolve:
  n_cls: 11                       # labels_11class.csv と splits/11class/cv10 を解決
  folds: 10
  feature_root: ${FEATURE_ROOT}   # 特徴ルートの base .env で渡す
  cohort_root: cohort

sweep:
  encoder: [Virchow2]
  feature_type: [cls]             # Virchow2 の CLS トークン特徴（1280 次元）
  magnifications:
    - [40.0]                      # 単一倍率ベースライン（ABMIL / CLAM）
    - [20.0]
    - [10.0]
    - [10.0, 20.0, 40.0]          # 多倍率 ZoomMIL（3 倍率）
    - [1.25, 2.5, 5.0, 10.0, 20.0, 40.0]   # 多倍率 ZoomMIL（全 6 倍率・低倍 start）
  instance_loss: [false, true]    # 単一倍率のみ有効 false=ABMIL / true=CLAM
  decorrelation_weight: [0.0, 0.1]   # A: 倍率間脱相関正則化 off/on（多倍率のみ）
  aux_norm: [softmax, entmax]     # B: スパース補助アテンション off(softmax)/on(entmax α=1.5)
  selector: [topk, dpp]           # D: 多様性選択 off(topk)/on(dpp cosine)

fixed:
  zoom_driver: differentiable     # C(mcts) は別 config で単独評価する
  topk_method: perturbed
  k_sample: 15                    # ズーム選択数 k（多倍率のみ有効）
  k_sigma: 0.002
  lr: 1.0e-4
  drop_out: 0.6
  fusion: sum
  seed: 42
  max_epochs: 50
  scheduler_patience: 10
  scheduler_decay_rate: 0.8
  reg: 1.0e-4
  save_metric: f1                 # val weighted-F1 最大でモデル選択
  is_weighted_sampler: true       # 11 クラスの不均衡に対応
  num_workers: 1

# 環境に合わせて --gpu-ids / --jobs-per-gpu で上書きする（動的 GPU キューで割り当て）
parallel:
  gpu_ids: [0, 1, 2]
  jobs_per_gpu: 12
